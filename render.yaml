# Render Blueprint for Legacy Code Surgeon AI
# This file defines the infrastructure for deploying on Render.com

services:
  # Backend Service (FastAPI)
  - type: web
    name: legacy-surgeon-backend
    env: python
    region: oregon
    plan: starter
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BOB_AI_API_KEY
        sync: false
      - key: BOB_AI_API_URL
        value: https://api.dataplatform.cloud.ibm.com/semantic_agents/public/v1/mcp_server/mcp/
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: https://legacy-surgeon-frontend.onrender.com
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        fromService:
          type: web
          name: legacy-surgeon-backend
          property: port
    disk:
      name: storage
      mountPath: /app/backend/app/storage
      sizeGB: 1

  # Frontend Service (React + Vite)
  - type: web
    name: legacy-surgeon-frontend
    env: static
    region: oregon
    plan: starter
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: legacy-surgeon-backend
          property: host

