services:
  # Backend Service
  - type: web
    name: legacy-surgeon-backend
    env: python
    region: oregon
    plan: starter
    branch: main

    buildCommand: pip install -r backend/requirements.txt

    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: BOB_AI_API_KEY
        sync: false

      - key: BOB_AI_API_URL
        value: https://api.dataplatform.cloud.ibm.com/semantic_agents/public/v1/mcp_server/mcp/

      - key: ENVIRONMENT
        value: production

      - key: SECRET_KEY
        generateValue: true

      - key: LOG_LEVEL
        value: INFO

      - key: CORS_ORIGINS
        value: https://legacy-surgeon-frontend.onrender.com

    disk:
      name: storage
      mountPath: /app/backend/app/storage
      sizeGB: 1

   # Frontend Service
  - type: web
    name: legacy-surgeon-frontend
    env: static
    branch: main

    buildCommand: cd frontend && npm install && npm run build

    staticPublishPath: frontend/dist

    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN

      - path: /*
        name: X-Content-Type-Options
        value: nosniff

      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: NODE_VERSION
        value: 18.17.0

      - key: VITE_API_URL
        value: https://legacy-surgeon-backend.onrender.com
